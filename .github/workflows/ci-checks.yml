name: CI Checks
on:
  push:
    branches: [master]
  pull_request:

jobs:
  idl-submodule-points-to-master:
    name: IDL submodule points to master
    runs-on: ubuntu-latest # uses ubuntu as runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true # ensures git submodules are intialized and updated
          fetch-depth: 0 # get full history for branch checking

      - name: Check IDL submodule status (must point to master)
        run: make .idl-status

  golang-unit-test:
    name: Golang unit test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0 # get full history for branch checking

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.4'
          cache: true

      - name: Run unit tests with coverage
        run: make cover_profile

      - name: Generate coverage metadata
        run: ./scripts/github_actions/gen_coverage_metadata.sh .build/coverage/metadata.txt

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-unit-test-coverage
          path: |
            .build/coverage/*.out
            .build/coverage/metadata.txt


  golangci-lint-validate-code-is-clean:
    name: Golangci lint validate code is clean
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0 # get full history for branch checking

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.4'
          cache: true

      - name: Run golint
        run: ./scripts/github_actions/golint.sh


  golang-integration-test-with-etcd:
    if: github.event_name == 'pull_request'
    name: Golang integration test with etcd
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.4'
          cache: true

      - name: Start etcd
        run: |
          docker compose -f docker/github_actions/docker-compose.yml up -d etcd
          # Wait for etcd to be ready
          for i in {1..30}; do
            if docker compose -f docker/github_actions/docker-compose.yml exec -T etcd etcdctl endpoint health 2>/dev/null; then
              echo "etcd is ready"
              break
            fi
            echo "Waiting for etcd... ($i/30)"
            sleep 1
          done

      - name: Run integration test with etcd
        run: ETCD_ENDPOINTS=http://localhost:2379 make integration_tests_etcd

      - name: Stop etcd
        if: always()
        run: docker compose -f docker/github_actions/docker-compose.yml down
