services:
  etcd:
    image: bitnamilegacy/etcd:3.5.5
    restart: always
    ports:
      - "2379:2379"
    networks:
      services-network:
        aliases:
          - etcd
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"

networks:
  services-network:
    name: services-network
    driver: bridge
